<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | NO XCUSES</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="admin-login-page">
  <div class="admin-login-box">
    <div class="admin-logo">NO XCUSES</div>
    <div class="admin-subtitle" id="adminSubtitle">Panel Administracyjny</div>
    <form id="loginForm" class="admin-form">
      <div class="form-group">
        <label class="form-label" id="lAdminUser">Nazwa użytkownika</label>
        <input class="form-input" type="text" id="loginUser" required />
      </div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label" id="lAdminPass">Hasło</label>
        <input class="form-input" type="password" id="loginPass" required />
      </div>
      <p class="admin-error" id="loginError" style="display:none;margin-top:16px">Nieprawidłowe dane logowania.</p>
      <button type="submit" class="admin-btn" style="margin-top:24px" id="lAdminSubmit">ZALOGUJ</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="admin-header">
    <div class="admin-header-logo">NO XCUSES ADMIN</div>
    <div class="admin-header-right">
      <span id="adminUser" style="color:rgba(255,255,255,0.5)"></span>
      <button class="admin-logout" onclick="adminLogout()" id="lLogout">Wyloguj</button>
    </div>
  </div>

  <div class="admin-stats" id="adminStats"></div>

  <div style="background:#fff; border-bottom:1px solid #e0e0e0;">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="showTab('orders')" id="tabOrders">Zamówienia</button>
      <button class="admin-tab" onclick="showTab('ambassadors')" id="tabAmbassadors">Ambasadorzy</button>
      <button class="admin-tab" onclick="showTab('contacts')" id="tabContacts">Wiadomości</button>
    </div>
  </div>

  <div class="admin-content" id="adminContent"></div>
</div>

<script src="script.js"></script>
<script src="admin.js"></script>
</body>
</html>
