  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="configurator.html" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="navbar scrolled" id="navbar" role="navigation" aria-label="Główna nawigacja">
  <div class="navbar-inner">
    <button class="nav-logo" onclick="logoClick()" aria-label="NOXCUSES — strona główna">NO XCUSES</button>
    <div class="nav-links">
      <a href="index.html" data-pl="Strona Główna" data-en="Home">Strona Główna</a>
      <a href="configurator.html" class="active" aria-current="page" data-pl="Konfigurator" data-en="Configurator">Konfigurator</a>
      <a href="portfolio.html" data-pl="Portfolio" data-en="Portfolio">Portfolio</a>
      <a href="ambassador.html" data-pl="Ambasador" data-en="Ambassador">Ambasador</a>
      <a href="contact.html" data-pl="Kontakt" data-en="Contact">Kontakt</a>
      <button class="lang-btn" onclick="toggleLang()" id="langBtn" aria-label="Zmień język">EN</button>
    </div>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Otwórz menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Strona Główna</a>

    <button class="lang-btn" onclick="toggleLang()" id="langBtnMobile">EN</button>

<div class="config-page" role="main">
  <!-- Progress Bar -->
  <div class="progress-bar-wrapper" role="progressbar" aria-valuemin="1" aria-valuemax="10" aria-valuenow="1">
    <div class="progress-info">
      <span id="stepLabel">Krok 1 / 10</span>
      <span id="stepName">Produkt</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:10%"></div>
    </div>

  </div>

  <!-- Step Content -->
  <div class="config-content" id="configContent" aria-live="polite"></div>

  <!-- Command Bar -->
  <div class="config-bar">
    <button class="btn-back-config" id="btnBack" onclick="configBack()" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span id="backLabel">WSTECZ</span>
    </button>
    <!-- NEW: validation error hint -->
    <span class="config-validation-hint" id="validationHint" aria-live="assertive"></span>
    <button class="btn-next-config" id="btnNext" onclick="configNext()">
      <span id="nextLabel">DALEJ</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast" role="alert" aria-live="polite"></div>
<script src="script.js"></script>
<script src="firebase-config.js"></script>
<script src="configurator.js"></script>
</body>
</html>
